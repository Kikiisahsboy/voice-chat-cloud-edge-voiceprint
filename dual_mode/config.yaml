# =============================================================================
# Dual-Mode Voice Assistant Configuration (Windows Compatible)
# =============================================================================

# ----- Cloud Services -----
servers:
  cloud:
    asr:
      host: "100.125.0.54"
      port: 12306
    tts:
      host: "100.125.0.54"
      port: 11451           # Combined LLM+TTS server

  local:
    ollama:
      base_url: "http://localhost:11434"

# ----- Local ASR (Vosk) -----
asr:
  local:
    # 本地 Vosk 模型路径（云 ASR 不可用时自动切换）
    model_path: "D:/研一/多模态健康/比赛/vosk-model-cn-kaldi-multicn-0.15"

# ----- LLM Dual-Mode -----
llm:
  strategy: "cloud_first"
  cloud:
    model: "xinyu_teacher_nothink"
    tts_timeout_seconds: 10.0
  local:
    model: "qwen2:1.5b"
    timeout_seconds: 60.0
    temperature: 0.7
    num_predict: 512

# ----- Wake Word (openwakeword) -----
wake_word:
  enabled: true
  # Pre-trained model name from openwakeword:
  # "alexa", "hey_mycroft", "hey_jarvis", "ok_nabu", etc.
  model: "alexa"
  # Sensitivity threshold (0-1), lower = more sensitive
  threshold: 0.5

# ----- Voiceprint (SpeechBrain) -----
voiceprint:
  enabled: true
  model: "speechbrain/spkrec-ecapa-voxceleb"
  embedding_dim: 192
  identification_threshold: 0.55
  min_audio_duration_seconds: 0.8
  enrollment_dir: "dual_mode/enrolled_speakers/"

# ----- Audio -----
audio:
  sample_rate: 16000
  tts_sample_rate: 24000
  channels: 1
  frames_per_buffer: 2048
  # VAD settings
  vad_aggressiveness: 3       # 0-3, 3 = most aggressive
  vad_frame_ms: 30            # 10, 20, or 30
  silence_timeout_seconds: 1.5
  speech_start_threshold: 0.5
  speech_end_threshold: 0.3

# ----- Conversation -----
conversation:
  listen_timeout_seconds: 10.0
  exit_phrases:
    - "退出"
    - "再见"
    - "exit"
    - "quit"

# ----- Sounds -----
sounds:
  ding: "client/resources/ding.wav"
  dong: "client/resources/dong.wav"
